<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d" font-family="Inter,Segoe UI,Arial,sans-serif">
  <title id="t">TikTok Events API for Shopify 2026 — server-side CompletePayment event flow versus blocked browser pixel</title>
  <desc id="d">Diagram showing why TikTok conversions go missing and how the server-side fix works. Top path: the browser TikTok pixel is blocked by iOS restrictions and ad blockers, so the Purchase never reaches TikTok. Bottom path: a Shopify order-paid webhook triggers Make.com, which sends a CompletePayment event with hashed email and phone to the TikTok Events API server-to-server, reaching Event Match Quality scores of 6 to 8. Critical detail: TikTok requires the event name CompletePayment, not Purchase.</desc>
  <rect width="1200" height="630" fill="#050505"/>
  <rect x="0" y="0" width="1200" height="4" fill="#22c55e"/>
  <text x="60" y="66" fill="#22c55e" font-size="15" font-weight="700" letter-spacing="3">TIKTOK SERVER-SIDE TRACKING · FREE</text>
  <text x="60" y="106" fill="#f5f5f5" font-size="33" font-weight="800">TikTok Events API on Shopify — Why "CompletePayment" Matters</text>

  <!-- top blocked lane -->
  <text x="60" y="170" fill="#f87171" font-size="16" font-weight="800">✕ BROWSER PIXEL (what most stores still run)</text>
  <rect x="60" y="190" width="220" height="90" rx="12" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="170" y="228" fill="#f5f5f5" font-size="17" font-weight="700" text-anchor="middle">Customer checkout</text>
  <text x="170" y="252" fill="#9a9a9a" font-size="13" text-anchor="middle">Safari / in-app browser</text>

  <line x1="280" y1="235" x2="450" y2="235" stroke="#7f1d1d" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="455" y="190" width="230" height="90" rx="12" fill="#120c0c" stroke="#7f1d1d"/>
  <text x="570" y="222" fill="#f87171" font-size="16" font-weight="800" text-anchor="middle">BLOCKED</text>
  <text x="570" y="246" fill="#c7c7c7" font-size="13" text-anchor="middle">iOS ITP · ad blockers ·</text>
  <text x="570" y="264" fill="#c7c7c7" font-size="13" text-anchor="middle">cookie expiry</text>

  <line x1="685" y1="235" x2="850" y2="235" stroke="#7f1d1d" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="855" y="190" width="285" height="90" rx="12" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="997" y="228" fill="#f5f5f5" font-size="16" font-weight="700" text-anchor="middle">TikTok Ads Manager</text>
  <text x="997" y="252" fill="#f87171" font-size="13" font-weight="700" text-anchor="middle">20–40% of purchases missing</text>

  <!-- bottom server lane -->
  <text x="60" y="352" fill="#22c55e" font-size="16" font-weight="800">✓ SERVER-SIDE VIA EVENTS API (the free fix)</text>
  <rect x="60" y="372" width="220" height="100" rx="12" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="170" y="410" fill="#f5f5f5" font-size="17" font-weight="700" text-anchor="middle">Shopify backend</text>
  <text x="170" y="434" fill="#9a9a9a" font-size="13" text-anchor="middle">orders/paid webhook</text>
  <text x="170" y="454" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">fires on every payment</text>

  <line x1="280" y1="422" x2="450" y2="422" stroke="#22c55e" stroke-width="3"/>
  <polygon points="450,422 434,414 434,430" fill="#22c55e"/>

  <rect x="455" y="372" width="230" height="100" rx="12" fill="#0f1512" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="406" fill="#f5f5f5" font-size="17" font-weight="700" text-anchor="middle">Make.com</text>
  <text x="570" y="430" fill="#c7c7c7" font-size="13" text-anchor="middle">hashes email + phone</text>
  <text x="570" y="452" fill="#22c55e" font-size="13" font-weight="800" text-anchor="middle">event: "CompletePayment"</text>

  <line x1="685" y1="422" x2="850" y2="422" stroke="#22c55e" stroke-width="3"/>
  <polygon points="850,422 834,414 834,430" fill="#22c55e"/>
  <text x="767" y="405" fill="#c7c7c7" font-size="12" text-anchor="middle">server-to-server</text>

  <rect x="855" y="372" width="285" height="100" rx="12" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="997" y="410" fill="#f5f5f5" font-size="16" font-weight="700" text-anchor="middle">TikTok Events API</text>
  <text x="997" y="434" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">EMQ 6–8 · attribution restored</text>
  <text x="997" y="456" fill="#9a9a9a" font-size="12" text-anchor="middle">cannot be blocked client-side</text>

  <!-- warning strip -->
  <rect x="60" y="512" width="1080" height="60" rx="12" fill="#131108" stroke="#f59e0b"/>
  <text x="85" y="537" fill="#f59e0b" font-size="14" font-weight="800">⚠ THE #1 SETUP MISTAKE</text>
  <text x="85" y="559" fill="#c7c7c7" font-size="14">Sending "Purchase" to TikTok's Events API — it appears in Events Manager but is never used for attribution. TikTok requires "CompletePayment".</text>

  <text x="60" y="606" fill="#525252" font-size="13">stackarchitect.xyz/tiktok-events-api-shopify/ · ~6 min setup · $0/mo · no Shopify app</text>
</svg>
