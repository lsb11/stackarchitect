<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d" font-family="Inter,Segoe UI,Arial,sans-serif">
  <title id="t">Google Apps Script quota limits 2026 — consumer vs Workspace comparison chart</title>
  <desc id="d">Chart comparing official Google Apps Script quotas in 2026: single execution time is 6 minutes on both consumer and Workspace accounts; daily trigger runtime is 90 minutes on consumer versus 6 hours on Workspace; UrlFetch calls are 20,000 per day consumer versus 100,000 Workspace; email recipients are 100 per day consumer versus 1,500 Workspace. All daily quotas reset on a 24-hour rolling window.</desc>
  <rect width="1200" height="630" fill="#050505"/>
  <rect x="0" y="0" width="1200" height="4" fill="#22c55e"/>
  <text x="60" y="70" fill="#22c55e" font-size="15" font-weight="700" letter-spacing="3">OFFICIAL LIMITS · VERIFIED APRIL 2026</text>
  <text x="60" y="112" fill="#f5f5f5" font-size="34" font-weight="800">Google Apps Script Quotas 2026 — Consumer vs Workspace</text>

  <!-- legend -->
  <rect x="60" y="140" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="82" y="152" fill="#c7c7c7" font-size="15">Consumer (free @gmail.com)</text>
  <rect x="330" y="140" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="352" y="152" fill="#c7c7c7" font-size="15">Google Workspace</text>
  <text x="1140" y="152" fill="#9a9a9a" font-size="14" text-anchor="end">Daily quotas reset on a 24h rolling window</text>

  <!-- Row 1: execution time -->
  <g>
    <text x="60" y="212" fill="#f5f5f5" font-size="18" font-weight="700">Single execution time</text>
    <text x="60" y="234" fill="#9a9a9a" font-size="13">Identical on both plans — upgrading does NOT raise this</text>
    <rect x="420" y="192" width="330" height="22" rx="6" fill="#f59e0b"/>
    <text x="762" y="208" fill="#f5f5f5" font-size="15" font-weight="700">6 min</text>
    <rect x="420" y="220" width="330" height="22" rx="6" fill="#22c55e"/>
    <text x="762" y="236" fill="#f5f5f5" font-size="15" font-weight="700">6 min — same hard ceiling</text>
  </g>

  <!-- Row 2: trigger runtime/day -->
  <g>
    <text x="60" y="302" fill="#f5f5f5" font-size="18" font-weight="700">Trigger runtime / day</text>
    <text x="60" y="324" fill="#9a9a9a" font-size="13">Combined runtime of all triggered executions</text>
    <rect x="420" y="282" width="140" height="22" rx="6" fill="#f59e0b"/>
    <text x="572" y="298" fill="#f5f5f5" font-size="15" font-weight="700">90 min</text>
    <rect x="420" y="310" width="560" height="22" rx="6" fill="#22c55e"/>
    <text x="992" y="326" fill="#f5f5f5" font-size="15" font-weight="700">6 hours (4×)</text>
  </g>

  <!-- Row 3: UrlFetch/day -->
  <g>
    <text x="60" y="392" fill="#f5f5f5" font-size="18" font-weight="700">UrlFetch calls / day</text>
    <text x="60" y="414" fill="#9a9a9a" font-size="13">Every external API call counts — Shopify, tracking, webhooks</text>
    <rect x="420" y="372" width="130" height="22" rx="6" fill="#f59e0b"/>
    <text x="562" y="388" fill="#f5f5f5" font-size="15" font-weight="700">20,000</text>
    <rect x="420" y="400" width="650" height="22" rx="6" fill="#22c55e"/>
    <text x="1082" y="416" fill="#f5f5f5" font-size="15" font-weight="700">100,000 (5×)</text>
  </g>

  <!-- Row 4: email recipients -->
  <g>
    <text x="60" y="482" fill="#f5f5f5" font-size="18" font-weight="700">Email recipients / day</text>
    <text x="60" y="504" fill="#9a9a9a" font-size="13">MailApp + GmailApp combined</text>
    <rect x="420" y="462" width="60" height="22" rx="6" fill="#f59e0b"/>
    <text x="492" y="478" fill="#f5f5f5" font-size="15" font-weight="700">100</text>
    <rect x="420" y="490" width="560" height="22" rx="6" fill="#22c55e"/>
    <text x="992" y="506" fill="#f5f5f5" font-size="15" font-weight="700">1,500 (15×)</text>
  </g>

  <!-- footer strip -->
  <rect x="60" y="552" width="1080" height="2" fill="#232323"/>
  <text x="60" y="590" fill="#c7c7c7" font-size="15">The 6-minute per-execution wall cannot be bought away — high-volume workflows are offloaded to a webhook engine (Make.com free tier) instead.</text>
  <text x="60" y="614" fill="#525252" font-size="13">stackarchitect.xyz/blog/google-apps-script-quotas-explained-how-to-avoid-limits-and-scale-your-automations/</text>
</svg>
