<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d" font-family="Inter,Segoe UI,Arial,sans-serif">
  <title id="t">Shopify server-side tracking architecture 2026 — one webhook feeding Meta CAPI, Google Enhanced Conversions and TikTok Events API</title>
  <desc id="d">Data-flow diagram: a Shopify order-paid webhook fires from the store backend into one Make.com scenario, which hashes customer data and sends server-to-server events in parallel to Meta Conversions API, Google Ads Enhanced Conversions, and TikTok Events API using the CompletePayment event. Because events originate server-side, iOS Link Tracking Protection and ad blockers cannot intercept them, recovering 20 to 40 percent of conversions invisible to browser pixels.</desc>
  <rect width="1200" height="630" fill="#050505"/>
  <rect x="0" y="0" width="1200" height="4" fill="#22c55e"/>
  <text x="60" y="66" fill="#22c55e" font-size="15" font-weight="700" letter-spacing="3">SERVER-SIDE TRACKING · $0 STACK</text>
  <text x="60" y="106" fill="#f5f5f5" font-size="33" font-weight="800">How Shopify Server-Side Tracking Works (2026)</text>

  <!-- Shopify node -->
  <rect x="60" y="230" width="230" height="150" rx="14" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="175" y="285" fill="#f5f5f5" font-size="21" font-weight="800" text-anchor="middle">Shopify</text>
  <text x="175" y="313" fill="#9a9a9a" font-size="14" text-anchor="middle">orders/paid webhook</text>
  <text x="175" y="335" fill="#9a9a9a" font-size="14" text-anchor="middle">fires from the backend</text>
  <text x="175" y="357" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">no app install · no theme code</text>

  <!-- arrow 1 -->
  <line x1="290" y1="305" x2="430" y2="305" stroke="#22c55e" stroke-width="3"/>
  <polygon points="430,305 414,297 414,313" fill="#22c55e"/>
  <text x="360" y="288" fill="#c7c7c7" font-size="13" text-anchor="middle">JSON payload</text>

  <!-- Make node -->
  <rect x="435" y="215" width="260" height="180" rx="14" fill="#0f1512" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="262" fill="#f5f5f5" font-size="21" font-weight="800" text-anchor="middle">Make.com</text>
  <text x="565" y="288" fill="#9a9a9a" font-size="14" text-anchor="middle">1 scenario · free tier</text>
  <text x="565" y="316" fill="#c7c7c7" font-size="14" text-anchor="middle">SHA-256 hashes email,</text>
  <text x="565" y="336" fill="#c7c7c7" font-size="14" text-anchor="middle">phone, name, IP, UA</text>
  <text x="565" y="366" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">3 ops per order ≈ 330 orders/mo free</text>

  <!-- arrows to platforms -->
  <line x1="695" y1="255" x2="855" y2="165" stroke="#22c55e" stroke-width="3"/>
  <polygon points="855,165 837,167 845,182" fill="#22c55e"/>
  <line x1="695" y1="305" x2="855" y2="305" stroke="#22c55e" stroke-width="3"/>
  <polygon points="855,305 839,297 839,313" fill="#22c55e"/>
  <line x1="695" y1="355" x2="855" y2="445" stroke="#22c55e" stroke-width="3"/>
  <polygon points="855,445 845,428 837,443" fill="#22c55e"/>

  <!-- platform nodes -->
  <rect x="860" y="115" width="280" height="100" rx="14" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="1000" y="158" fill="#f5f5f5" font-size="18" font-weight="800" text-anchor="middle">Meta Conversions API</text>
  <text x="1000" y="186" fill="#9a9a9a" font-size="14" text-anchor="middle">Purchase event · EMQ 7–8.5</text>

  <rect x="860" y="255" width="280" height="100" rx="14" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="1000" y="298" fill="#f5f5f5" font-size="18" font-weight="800" text-anchor="middle">Google Enhanced Conversions</text>
  <text x="1000" y="326" fill="#9a9a9a" font-size="14" text-anchor="middle">hashed email · no gclid needed</text>

  <rect x="860" y="395" width="280" height="100" rx="14" fill="#0f1512" stroke="#2f2f2f"/>
  <text x="1000" y="438" fill="#f5f5f5" font-size="18" font-weight="800" text-anchor="middle">TikTok Events API</text>
  <text x="1000" y="466" fill="#9a9a9a" font-size="14" text-anchor="middle">CompletePayment event · EMQ 6–8</text>

  <!-- blocked path -->
  <rect x="60" y="470" width="630" height="90" rx="14" fill="#120c0c" stroke="#7f1d1d"/>
  <text x="85" y="505" fill="#f87171" font-size="15" font-weight="800">✕ THE OLD BROWSER-PIXEL PATH</text>
  <text x="85" y="532" fill="#c7c7c7" font-size="14">iOS 26 Link Tracking Protection strips fbclid/gclid; ad blockers kill the pixel —</text>
  <text x="85" y="552" fill="#c7c7c7" font-size="14">20–40% of ad-driven purchases never reach Meta, Google or TikTok.</text>

  <text x="60" y="605" fill="#525252" font-size="13">stackarchitect.xyz/blog/shopify-server-side-tracking-complete-setup-guide/ · Setup time ≈ 18 min · $0/mo</text>
</svg>
