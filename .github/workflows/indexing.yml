name: Google Indexing API
on:
  push:
    branches:
      - main

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Auth
        run: npm install googleapis

      - name: Run Indexing Script
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
          SITEMAP_URL: "https://stackarchitect.xyz/sitemap-index.xml"
        run: |
          cat << 'EOF' > indexer.js
          const { google } = require('googleapis');
          const https = require('https');
          const credentials = JSON.parse(process.env.GOOGLE_INDEXING_KEY);
          const sitemapUrl = process.env.SITEMAP_URL;

          const auth = new google.auth.JWT(
            credentials.client_email,
            null,
            credentials.private_key,
            ['https://www.googleapis.com/auth/indexing']
          );

          async function getUrls() {
            return new Promise((resolve) => {
              https.get(sitemapUrl, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => {
                  const urls = [...data.matchAll(/<loc>(.*?)<\/loc>/g)].map(m => m[1]);
                  resolve(urls);
                });
              });
            });
          }

          async function run() {
            const urls = await getUrls();
            const tokens = await auth.authorize();
            for (const url of urls) {
              if (url.includes('.xml')) continue; // Skip nested sitemaps
              console.log(`Indexing: ${url}`);
              const options = {
                hostname: 'indexing.googleapis.com',
                path: '/v3/urlNotifications:publish',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${tokens.access_token}`
                }
              };
              const req = https.request(options, (res) => {
                res.on('data', () => {});
              });
              req.write(JSON.stringify({ url: url, type: 'URL_UPDATED' }));
              req.end();
            }
          }
          run().catch(console.error);
          EOF
          node indexer.js
