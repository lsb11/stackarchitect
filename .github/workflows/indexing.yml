name: Ping Google Sitemap
on:
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://stackarchitect.xyz/sitemap-index.xml"
          echo "Sitemap pinged successfully"
