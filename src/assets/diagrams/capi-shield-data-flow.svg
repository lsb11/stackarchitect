<svg role="img" aria-labelledby="capiFlowTitle capiFlowDesc" viewBox="0 0 1120 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;font-family:var(--mono,ui-monospace,Menlo,monospace);">
  <title id="capiFlowTitle">How CAPI Shield routes Shopify conversion data server-side</title>
  <desc id="capiFlowDesc">A Shopify order webhook triggers a Make.com scenario that hashes customer data and forwards a server-side conversion event in parallel to Meta Conversions API, Google Enhanced Conversions, and TikTok Events API — bypassing the browser pixel that iOS and ad blockers break.</desc>

  <defs>
    <linearGradient id="capiGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00c864"/>
      <stop offset="1" stop-color="#00a854"/>
    </linearGradient>
    <linearGradient id="capiTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00c864" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00c864" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00c864" stop-opacity="0"/>
    </linearGradient>
    <marker id="capiArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00c864"/>
    </marker>
    <marker id="capiArrowDim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <filter id="capiGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BROKEN BROWSER PATH (top, greyed) ── -->
  <g opacity="0.5">
    <rect x="40" y="34" width="196" height="70" rx="10" fill="#0f0f0f" stroke="#1e293b" stroke-width="1.5"/>
    <text x="138" y="62" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">Browser pixel</text>
    <text x="138" y="82" text-anchor="middle" fill="#64748b" font-size="10.5">client-side event</text>

    <line x1="236" y1="69" x2="470" y2="69" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#capiArrowDim)"/>

    <!-- interception -->
    <g transform="translate(353 69)">
      <circle r="19" fill="#0f0f0f" stroke="#7f1d1d" stroke-width="1.6"/>
      <path d="M-7 -7 L7 7 M7 -7 L-7 7" stroke="#ef4444" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <text x="353" y="112" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">iOS · ad blockers · ITP</text>

    <rect x="470" y="34" width="196" height="70" rx="10" fill="#0f0f0f" stroke="#1e293b" stroke-width="1.5"/>
    <text x="568" y="62" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">Ad platforms</text>
    <text x="568" y="82" text-anchor="middle" fill="#64748b" font-size="10.5">20–40% never arrive</text>
  </g>
  <text x="40" y="20" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">// THE BROKEN PATH — BROWSER TRACKING</text>

  <!-- divider -->
  <line x1="40" y1="140" x2="1080" y2="140" stroke="#1f1f1f" stroke-width="1"/>
  <text x="40" y="168" fill="#00c864" font-size="10" font-weight="800" letter-spacing="1.5">// CAPI SHIELD — THE SERVER-SIDE PATH</text>

  <!-- ── SERVER PATH ── -->
  <!-- 1. Shopify -->
  <g>
    <rect x="40" y="196" width="188" height="96" rx="12" fill="#0f0f0f" stroke="url(#capiGreen)" stroke-width="1.8"/>
    <text x="64" y="228" fill="#00c864" font-size="11" font-weight="800">01</text>
    <text x="134" y="240" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">Shopify</text>
    <text x="134" y="262" text-anchor="middle" fill="#94a3b8" font-size="11">orders/paid</text>
    <text x="134" y="278" text-anchor="middle" fill="#64748b" font-size="10">webhook fires server-side</text>
  </g>

  <!-- track 1->2 -->
  <line x1="228" y1="244" x2="330" y2="244" stroke="url(#capiTrack)" stroke-width="2.4" marker-end="url(#capiArrow)"/>
  <rect x="248" y="230" width="62" height="18" rx="9" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="279" y="243" text-anchor="middle" fill="#00c864" font-size="9" font-weight="700">HTTPS</text>

  <!-- 2. Make.com engine -->
  <g>
    <rect x="330" y="184" width="230" height="176" rx="14" fill="#0b0f0d" stroke="url(#capiGreen)" stroke-width="1.8" filter="url(#capiGlow)"/>
    <text x="354" y="214" fill="#00c864" font-size="11" font-weight="800">02</text>
    <text x="445" y="214" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="800">Make.com scenario</text>
    <text x="445" y="234" text-anchor="middle" fill="#64748b" font-size="10">runs on the free tier</text>

    <!-- inner steps -->
    <g>
      <rect x="352" y="248" width="186" height="30" rx="7" fill="#0f0f0f" stroke="#1e293b" stroke-width="1"/>
      <circle cx="368" cy="263" r="4" fill="#00c864"/>
      <text x="382" y="267" fill="#e2e8f0" font-size="10.5">Parse order payload</text>

      <rect x="352" y="284" width="186" height="30" rx="7" fill="#0f0f0f" stroke="#1e293b" stroke-width="1"/>
      <circle cx="368" cy="299" r="4" fill="#00c864"/>
      <text x="382" y="303" fill="#e2e8f0" font-size="10.5">SHA-256 hash PII</text>

      <rect x="352" y="320" width="186" height="30" rx="7" fill="#0f0f0f" stroke="#1e293b" stroke-width="1"/>
      <circle cx="368" cy="335" r="4" fill="#00c864"/>
      <text x="382" y="339" fill="#e2e8f0" font-size="10.5">Attach event_id → dedupe</text>
    </g>
  </g>

  <!-- Router fan-out node -->
  <g>
    <circle cx="606" cy="272" r="26" fill="#0f0f0f" stroke="url(#capiGreen)" stroke-width="1.8"/>
    <text x="606" y="269" text-anchor="middle" fill="#00c864" font-size="9.5" font-weight="800">ROUTER</text>
    <text x="606" y="283" text-anchor="middle" fill="#64748b" font-size="8">parallel</text>
  </g>
  <line x1="560" y1="272" x2="580" y2="272" stroke="#00c864" stroke-width="2.4" marker-end="url(#capiArrow)"/>

  <!-- three destination tracks -->
  <path d="M632 260 C 700 210, 740 190, 812 190" fill="none" stroke="url(#capiTrack)" stroke-width="2.4" marker-end="url(#capiArrow)"/>
  <path d="M634 272 C 720 272, 740 272, 812 272" fill="none" stroke="url(#capiTrack)" stroke-width="2.4" marker-end="url(#capiArrow)"/>
  <path d="M632 284 C 700 334, 740 354, 812 354" fill="none" stroke="url(#capiTrack)" stroke-width="2.4" marker-end="url(#capiArrow)"/>

  <!-- destinations -->
  <g>
    <rect x="812" y="162" width="268" height="56" rx="10" fill="#0f0f0f" stroke="#1877f2" stroke-width="1.6"/>
    <text x="836" y="186" fill="#1877f2" font-size="13" font-weight="800">Meta</text>
    <text x="836" y="204" fill="#94a3b8" font-size="10.5">Conversions API</text>
    <text x="1056" y="196" text-anchor="end" fill="#00c864" font-size="11" font-weight="800">EMQ ↑</text>

    <rect x="812" y="244" width="268" height="56" rx="10" fill="#0f0f0f" stroke="#ea4335" stroke-width="1.6"/>
    <text x="836" y="268" fill="#ea4335" font-size="13" font-weight="800">Google</text>
    <text x="836" y="286" fill="#94a3b8" font-size="10.5">Enhanced Conversions</text>
    <text x="1056" y="278" text-anchor="end" fill="#00c864" font-size="11" font-weight="800">Smart Bidding ↑</text>

    <rect x="812" y="326" width="268" height="56" rx="10" fill="#0f0f0f" stroke="#e2e8f0" stroke-width="1.6"/>
    <text x="836" y="350" fill="#f8fafc" font-size="13" font-weight="800">TikTok</text>
    <text x="836" y="368" fill="#94a3b8" font-size="10.5">Events API</text>
    <text x="1056" y="360" text-anchor="end" fill="#00c864" font-size="11" font-weight="800">ROAS ↑</text>
  </g>
  <text x="812" y="148" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.2">// 03 — RECOVERED, SERVER-TO-SERVER</text>

  <!-- footer proof bar -->
  <g>
    <rect x="40" y="424" width="1040" height="64" rx="12" fill="#0b0f0d" stroke="#132018" stroke-width="1.4"/>
    <text x="64" y="452" fill="#00c864" font-size="12" font-weight="800">The browser never touches this path.</text>
    <text x="64" y="472" fill="#94a3b8" font-size="11">Because events leave from Shopify's server, iOS Link Tracking Protection, ITP, and ad blockers cannot intercept them — recovering 20–40% of conversions.</text>
    <text x="1056" y="452" text-anchor="end" fill="#f8fafc" font-size="12" font-weight="800">$0 / month</text>
    <text x="1056" y="472" text-anchor="end" fill="#64748b" font-size="10">vs Elevar $150+ · Northbeam $300+</text>
  </g>
</svg>
